<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} — {{ .Site.Title }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { font-size: 17px; }
    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #fafaf8;
      color: #1c1c1c;
      margin: 0 auto;
      max-width: 600px;
      padding: 5rem 1.5rem 7rem;
      line-height: 1.75;
    }
    a {
      color: inherit;
      text-decoration: underline;
      text-decoration-color: #c5c2bc;
      text-underline-offset: 3px;
    }
    a:hover { text-decoration-color: #1c1c1c; }
    .back {
      font-size: 0.875rem;
      color: #aaa;
      margin-bottom: 3.5rem;
      display: block;
      text-decoration: none;
    }
    .back:hover { color: #1c1c1c; }
    h1 {
      font-size: 1.4rem;
      font-weight: normal;
      margin: 0 0 0.5rem;
      letter-spacing: -0.015em;
      line-height: 1.3;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 2.5rem;
    }
    .tag {
      font-size: 0.75rem;
      color: #888;
      background: #f0ede8;
      border-radius: 3px;
      padding: 0.2em 0.55em;
      font-family: system-ui, sans-serif;
      letter-spacing: 0.02em;
    }
    p { margin: 0 0 1.25rem; color: #333; }
    h2 {
      font-size: 1.05rem;
      font-weight: normal;
      margin: 2rem 0 0.75rem;
    }
    hr {
      border: none;
      border-top: 1px solid #e5e3de;
      margin: 2rem 0;
    }
    blockquote {
      border-left: 2px solid #ddd;
      margin: 0 0 1.25rem;
      padding-left: 1.25rem;
      color: #666;
    }
  </style>
</head>
<body>
  <a class="back" href="/">← Dave Moyer</a>

  <h1>{{ .Title }}</h1>
  {{ with .Params.tags }}
  <div class="tags">
    {{ range . }}<span class="tag">{{ . }}</span>{{ end }}
  </div>
  {{ end }}

  {{ .Content }}
</body>
</html>
