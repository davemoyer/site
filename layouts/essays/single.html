<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} — {{ .Site.Title }}</title>
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  {{ template "_internal/google_analytics.html" . }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400..600;1,400..500&family=Newsreader:ital,wght@0,400;0,500;1,400&family=Inter:wght@500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { font-size: 17px; }
    body {
      font-family: 'Newsreader', Georgia, 'Times New Roman', serif;
      font-optical-sizing: auto;
      background: #fafaf8;
      color: #1c1c1c;
      margin: 0 auto;
      max-width: 600px;
      padding: 5rem 1.5rem 7rem;
      line-height: 1.75;
    }
    a {
      color: inherit;
      text-decoration: underline;
      text-decoration-color: #c5c2bc;
      text-underline-offset: 3px;
    }
    a:hover { text-decoration-color: #1c1c1c; }
    .back {
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 500;
      font-size: 0.8rem;
      color: #aaa;
      margin-bottom: 3.5rem;
      display: block;
      text-decoration: none;
    }
    .back:hover { color: #1c1c1c; }
    h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.6rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
      letter-spacing: -0.018em;
      line-height: 1.3;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 2.5rem;
    }
    .tag {
      font-size: 0.75rem;
      color: #888;
      background: #f0ede8;
      border-radius: 3px;
      padding: 0.2em 0.55em;
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    p { margin: 0 0 1.25rem; color: #333; }
    h2 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.15rem;
      font-weight: 500;
      font-style: italic;
      margin: 2rem 0 0.75rem;
    }
    hr {
      border: none;
      border-top: 1px solid #e5e3de;
      margin: 2rem 0;
    }
    blockquote {
      font-style: italic;
      border-left: 2px solid #ddd;
      margin: 0 0 1.25rem;
      padding-left: 1.25rem;
      color: #666;
    }
  </style>
</head>
<body>
  <a class="back" href="/">← Dave Moyer</a>

  <h1>{{ .Title }}</h1>
  {{ with .Params.tags }}
  <div class="tags">
    {{ range . }}<span class="tag">{{ . }}</span>{{ end }}
  </div>
  {{ end }}

  {{ .Content }}
</body>
</html>
